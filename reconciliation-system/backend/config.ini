# ==============================================================================
# Reconciliation System Configuration
# ==============================================================================

# ------------------------------------------------------------------------------
# Application Database (for storing users, configs, logs)
# Switch between sqlite (dev) and oracle (prod)
# ------------------------------------------------------------------------------
[database.app]
type = sqlite
path = ./data/app.db

# Uncomment below for Oracle production
# type = oracle
# dsn = localhost:1521/appdb
# user = app_user
# password = app_password

# ------------------------------------------------------------------------------
# VNPT Money Database Connections
# These are referenced by name in partner_service_config.data_b4_config
# ------------------------------------------------------------------------------
[database.vnptmoney_main]
type = oracle
dsn = 10.0.0.1:1521/vnptmoney
user = readonly_user
password = secret_password_1

[database.vnptmoney_replica]
type = oracle
dsn = 10.0.0.2:1521/vnptmoney_replica
user = readonly_user
password = secret_password_2

[database.partner_billing]
type = oracle
dsn = 10.0.0.3:1521/billing
user = billing_readonly
password = secret_password_3

# ------------------------------------------------------------------------------
# Application Settings
# ------------------------------------------------------------------------------
[app]
secret_key = your-super-secret-key-change-in-production
algorithm = HS256
access_token_expire_minutes = 480

# ------------------------------------------------------------------------------
# Storage Paths
# ------------------------------------------------------------------------------
[storage]
base_path = ./storage
uploads = ./storage/uploads
processed = ./storage/processed
exports = ./storage/exports
templates = ./storage/templates
sql_templates = ./storage/sql_templates
mock_data = ./storage/mock_data
custom_matching = ./storage/custom_matching

# ------------------------------------------------------------------------------
# Mock Mode (for testing without Oracle connection)
# ------------------------------------------------------------------------------
[mock]
enabled = true
