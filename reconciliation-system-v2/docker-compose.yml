version: '3.8'

services:
  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: reconciliation-backend
    expose:
      - "8001"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      # Database volume - data persists
      - ./backend/data:/app/data

      # Storage volumes
      - ./backend/storage/uploads:/app/storage/uploads
      - ./backend/storage/exports:/app/storage/exports
      - ./backend/storage/processed:/app/storage/processed
      - ./backend/storage/templates:/app/storage/templates
      - ./backend/storage/sql_templates:/app/storage/sql_templates
      - ./backend/storage/custom_matching:/app/storage/custom_matching

      # Logs volume
      - ./backend/logs:/app/logs

      # Config file (mount from host)
      - ./backend/config.ini:/app/config.ini:ro
    restart: unless-stopped
    networks:
      - reconciliation-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend Service
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: reconciliation-frontend
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - reconciliation-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - backend

  # Nginx Reverse Proxy — single entry point on port 3000
  nginx:
    image: nginx:alpine
    container_name: reconciliation-nginx
    ports:
      - "3000:3000"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - reconciliation-network

# Networks
networks:
  reconciliation-network:
    driver: bridge
